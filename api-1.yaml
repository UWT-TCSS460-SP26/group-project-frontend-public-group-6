              properties:
                status:
                  type: string
                  enum:
                    - Open
                    - InProgress
                    - Resolved
                    - Closed
                  example: InProgress
      responses:
        "200":
          description: Issue updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          description: Missing or invalid status value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
