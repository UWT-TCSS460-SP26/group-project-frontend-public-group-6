  /v1/discover/top-rated:
    get:
      tags:
        - Discovery
      summary: Get community top-rated movies and TV shows
      description: >
        Returns up to 20 movies and TV shows ranked by community average rating.
        Requires a minimum of 10 ratings to filter out items with too few votes.
        Each result is enriched with TMDB metadata. Items whose TMDB record
        cannot be found are silently omitted. Public route — no auth required.
      responses:
        "200":
          description: List of top-rated items enriched with TMDB metadata.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscoveryItem"
              example:
                - mediaId: 550
                  mediaType: movie
                  community_rating: 9.2
                  community_rating_count: 15
                  tmdb:
                    title: Fight Club
                    poster_path: /pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg
                    backdrop_path: /fCayJrkfRaCRCTh8GqN30f8oyQF.jpg
                    overview: A ticking-time-bomb insomniac and a slippery soap salesman channel
                      primal male aggression into a brawling underground club.
                    genres:
                      - id: 18
                        name: Drama
                    release_date: 1999-10-15
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/discover/most-reviewed:
    get:
      tags:
        - Discovery
      summary: Get community most-reviewed movies and TV shows
      description: >
        Returns up to 20 movies and TV shows ranked by total number of community
        ratings, regardless of score. Each result is enriched with TMDB
        metadata. Items whose TMDB record cannot be found are silently omitted.
        Public route — no auth required.
      responses:
        "200":
          description: List of most-reviewed items enriched with TMDB metadata.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiscoveryItem"
              example:
                - mediaId: 1396
                  mediaType: tv
                  community_rating: 8.8
                  community_rating_count: 42
                  tmdb:
                    name: Breaking Bad
                    poster_path: /ggFHVNu6YYI5L9pCfOacjizRGt.jpg
                    backdrop_path: /tsRy63Mu5cu8etL1X7ZLyf7UP1M.jpg
                    overview: When Walter White, a New Mexico chemistry teacher diagnosed with
                      cancer, turns to manufacturing methamphetamine to secure
                      his family's future.
                    genres:
                      - id: 18
                        name: Drama
                      - id: 80
                        name: Crime
                    first_air_date: 2008-01-20
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT issued by **Auth²** (`https://iam.onrender.com`).

        Required claims:

        - `iss`: `https://iam.onrender.com`

        - `aud`: `group-5-api`

        - `role`: one of `User`, `Moderator`, `Admin`, `SuperAdmin`, `Owner`

        Tokens are RS256-signed and verified via the Auth² JWKS endpoint at
        `https://iam.onrender.com/.well-known/jwks.json`. Obtain a token from
        Auth² and pass it as `Authorization: Bearer <token>`.
      x-issuer: https://iam.onrender.com
      x-audience: group-5-api
  schemas:
    MovieSummary:
      type: object
      description: A condensed movie object returned from list endpoints.
      properties:
        id:
          type: integer
          description: The TMDB movie ID.
          example: 557
        title:
          type: string
          description: The movie title.
          example: Spider-Man
        backdrop_path:
          type: string
          nullable: true
          description: Relative path to the backdrop image on TMDB's image CDN.
          example: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
        poster_path:
          type: string
          nullable: true
          description: Relative path to the poster image on TMDB's image CDN.
          example: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
    MovieDetail:
      type: object
      description: Detailed movie information returned from the single movie endpoint.
      properties:
        title:
          type: string
          example: Star Wars
        original_title:
          type: string
          example: Star Wars
        overview:
          type: string
          example: A long time ago in a galaxy far, far away...
        tagline:
          type: string
          example: A long time ago in a galaxy far, far away....
        runtime:
          type: integer
          example: 121
        release_date:
          type: string
          format: date
          example: 1977-05-25
        status:
          type: string
          example: Released
        adult:
          type: boolean
          example: false
        genre_ids:
          type: array
          items:
            type: integer
          example:
            - 12
        genres:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
          example:
            - id: 12
              name: Adventure
        original_language:
          type: string
          example: en
        spoken_languages:
          type: array
          items:
            type: object
            properties:
              english_name:
                type: string
              iso_639_1:
                type: string
              name:
                type: string
          example:
            - english_name: English
              iso_639_1: en
              name: English
        budget:
          type: integer
          example: 11000000
        revenue:
          type: integer
          example: 775398007
        poster_path:
          type: string
          nullable: true
          example: /6FfCtAuVAW8XJjZ7eWeLibRLWTw.jpg
        backdrop_path:
          type: string
          nullable: true
          example: /2w4xG178RpB4MDAIfTkqAuSJzec.jpg
        imdb_id:
          type: string
          example: tt0076759
        production_companies:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              logo_path:
                type: string
                nullable: true
              origin_country:
                type: string
        production_countries:
          type: array
          items:
            type: object
            properties:
              iso_3166_1:
                type: string
              name:
                type: string
        belongs_to_collection:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            poster_path:
              type: string
              nullable: true
            backdrop_path:
              type: string
              nullable: true
    TvSummary:
      type: object
      description: A condensed TV show object returned from list endpoints.
      properties:
        id:
          type: integer
          description: The TMDB TV show ID.
          example: 1396
        name:
          type: string
          description: The TV show name.
          example: Breaking Bad
        backdrop_path:
          type: string
          nullable: true
          description: Relative path to the backdrop image on TMDB's image CDN.
          example: /tsRy63Mu5cu8etL1X7ZLyf7UP1M.jpg
        poster_path:
          type: string
          nullable: true
          description: Relative path to the poster image on TMDB's image CDN.
          example: /ggFHVNu6YYI5L9pCfOacjizRGt.jpg
    TvDetail:
      type: object
      description: Detailed TV show information returned from the single TV endpoint.
      properties:
        name:
          type: string
          example: Breaking Bad
        original_name:
          type: string
          example: Breaking Bad
        overview:
          type: string
          example: A chemistry teacher diagnosed with cancer turns to manufacturing drugs.
        tagline:
          type: string
          nullable: true
          example: Change the equation.
        first_air_date:
          type: string
          format: date
          example: 2008-01-20
        last_air_date:
          type: string
          format: date
          nullable: true
          example: 2013-09-29
        status:
          type: string
          example: Ended
        type:
          type: string
          example: Scripted
        adult:
          type: boolean
          example: false
        genres:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
          example:
            - id: 18
              name: Drama
        original_language:
          type: string
          example: en
        spoken_languages:
          type: array
          items:
            type: object
            properties:
              english_name:
                type: string
