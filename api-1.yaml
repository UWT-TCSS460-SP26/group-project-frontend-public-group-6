openapi: 3.0.3
info:
  title: TCSS 460 Group 5 API
  description: |
    **Team:** Group 5
    **Deployed URL:** https://tcss460-group-5-api.onrender.com
    A RESTful API for the TCSS 460 group project.
  version: 0.1.0
servers:
  - url: https://tcss460-group-5-api.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: System
    description: Health and status routes
  - name: Movies
    description: Movie search, discovery, and details.
  - name: TV
    description: TV show search, discovery, and details.
  - name: Ratings
    description: User ratings for movies and TV shows.
  - name: Reviews
    description: User reviews for movies and TV shows.
  - name: Issues
    description: Bug report submission (public) and issue management (Admin+).
  - name: Discovery
    description: Community-ranked discovery feeds. Public — no auth required.
paths:
  /health:
    get:
      tags:
        - System
      summary: Health check
      description: Returns 200 OK when the API is alive. No auth required.
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: number
                    example: 3847.2
                  timestamp:
                    type: string
                    format: date-time
  /v1/movies:
    get:
      tags:
        - Movies
      summary: Search or discover movies
      description: >
        Returns a list of movies. If a `query` parameter is provided, performs a
        text search via TMDB's search endpoint. Otherwise, uses TMDB's discover
        endpoint with the provided filter parameters.
      parameters:
        - name: q
          in: query
          description: Text search query (e.g. "spiderman"). When provided, all filter
            parameters are ignored.
          required: false
          schema:
            type: string
          example: spiderman
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no
            greater than 50.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
        - name: primary_release_date_gte
          in: query
          description: Filter movies released on or after this date (YYYY-MM-DD). Only
            applies when `query` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: 2020-01-01
        - name: primary_release_date_lte
          in: query
          description: Filter movies released on or before this date (YYYY-MM-DD). Only
            applies when `query` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: 2024-12-31
        - name: with_genres
          in: query
          description: Comma-separated list of TMDB genre IDs to filter by. Only applies
            when `query` is not provided.
          required: false
          schema:
            type: string
          example: 28,878
        - name: with_runtime_gte
          in: query
          description: Filter by minimum runtime in minutes. Only applies when `query` is
            not provided.
          required: false
          schema:
            type: integer
          example: 90
        - name: with_runtime_lte
          in: query
          description: Filter by maximum runtime in minutes. Only applies when `query` is
            not provided.
          required: false
          schema:
            type: integer
          example: 180
      responses:
        "200":
          description: A list of movies matching the search or filter criteria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovieSummary"
              example:
                - id: 557
                  title: Spider-Man
                  backdrop_path: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
                  poster_path: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 50
        "500":
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/movies/popular:
    get:
      tags:
        - Movies
      summary: Get popular movies
      description: Returns a list of currently popular movies from TMDB.
      parameters:
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no
            greater than 50.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
      responses:
        "200":
          description: A list of popular movies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MovieSummary"
              example:
                - id: 557
                  title: Spider-Man
                  backdrop_path: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
                  poster_path: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 50
        "500":
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/movies/{id}:
    get:
      tags:
        - Movies
      summary: Get a movie by ID
      description: Returns detailed information for a specific movie by its TMDB movie ID.
      parameters:
        - name: id
          in: path
          description: The TMDB movie ID.
          required: true
          schema:
            type: integer
            minimum: 1
          example: 11
      responses:
        "200":
          description: Detailed information about the requested movie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieDetail"
        "400":
          description: Invalid movie ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Movie id must be a positive integer
        "404":
          description: Movie not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Movie with id 99999 not found
        "500":
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/tv:
    get:
      tags:
        - TV
      summary: Search or discover TV shows
      description: >
        Returns a list of TV shows. If a `q` parameter is provided, performs a
        text search via TMDB's search endpoint. Otherwise, uses TMDB's discover
        endpoint with the provided filter parameters.
      parameters:
        - name: q
          in: query
          description: Text search query (e.g. "breaking bad"). When provided, all filter
            parameters are ignored.
          required: false
          schema:
            type: string
          example: breaking bad
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no
            greater than 50.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
        - name: first_air_date_gte
          in: query
          description: Filter shows that first aired on or after this date (YYYY-MM-DD).
            Only applies when `q` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: 2020-01-01
        - name: first_air_date_lte
          in: query
          description: Filter shows that first aired on or before this date (YYYY-MM-DD).
            Only applies when `q` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: 2024-12-31
        - name: with_genres
          in: query
          description: Comma-separated list of TMDB genre IDs to filter by. Only applies
            when `q` is not provided.
          required: false
          schema:
            type: string
          example: 18,10765
        - name: with_runtime_gte
          in: query
          description: Filter by minimum episode runtime in minutes. Only applies when `q`
            is not provided.
          required: false
          schema:
            type: integer
          example: 20
        - name: with_runtime_lte
          in: query
          description: Filter by maximum episode runtime in minutes. Only applies when `q`
            is not provided.
          required: false
          schema:
            type: integer
          example: 60
      responses:
        "200":
          description: A list of TV shows matching the search or filter criteria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TvSummary"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 50
        "500":
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/tv/popular:
    get:
      tags:
        - TV
      summary: Get popular TV shows
      description: Returns a list of currently popular TV shows from TMDB.
      parameters:
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no
            greater than 50.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
      responses:
        "200":
          description: A list of popular TV shows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TvSummary"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 50
        "500":
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/tv/{id}:
    get:
      tags:
        - TV
      summary: Get a TV show by ID
      description: Returns detailed information for a specific TV show by its TMDB ID.
      parameters:
        - name: id
          in: path
          description: The TMDB TV show ID.
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1396
      responses:
        "200":
          description: Detailed information about the requested TV show.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TvDetail"
        "400":
          description: Invalid TV show ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: TV show id must be a positive integer
        "404":
          description: TV show not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: TV show with id 99999 not found
        "500":
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/ratings/{mediaType}/{mediaId}:
    get:
      tags:
        - Ratings
      summary: Get all ratings for a media item
      description: Returns all ratings for a given media type and ID.
      parameters:
        - name: mediaType
          in: path
          required: true
          schema:
            type: string
            enum:
              - movie
              - tv
              - book
          example: movie
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 550
      responses:
        "200":
          description: List of ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Invalid mediaId
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/ratings/{mediaType}/{mediaId}/{userId}:
    get:
      tags:
        - Ratings
      summary: Get a user's rating for a media item
      description: Returns the rating a specific user gave to a specific media item.
      parameters:
        - name: mediaType
          in: path
          required: true
          schema:
            type: string
            enum:
              - movie
              - tv
              - book
          example: movie
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 550
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 1
      responses:
        "200":
          description: Rating found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidMediaId:
                  summary: Non-integer mediaId
                  value:
                    error: Invalid mediaId
                invalidUserId:
                  summary: Non-integer userId
                  value:
                    error: Invalid userId
        "404":
          description: Rating not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Rating not found
  /v1/ratings:
    post:
      tags:
        - Ratings
      summary: Create a rating
      description: >
        Creates a new rating for the authenticated user. If the user already has
        a review for the same media item without a linked rating, that review's
        `ratingId` is automatically updated to reference the new rating. Returns
        409 if the user has already rated this item.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaId
                - mediaType
                - score
              properties:
                mediaId:
                  type: integer
                  minimum: 0
                  example: 550
                mediaType:
                  type: string
                  enum:
                    - movie
                    - tv
                    - book
                  example: movie
                score:
                  type: integer
                  minimum: 1
                  maximum: 10
                  example: 8
      responses:
        "201":
          description: Rating created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  summary: Required fields missing
                  value:
                    error: mediaId, mediaType, and score are required
                invalidMediaId:
                  summary: mediaId is not an integer
                  value:
                    error: mediaId must be an integer
                negativeMediaId:
                  summary: mediaId is negative
                  value:
                    error: mediaId must not be negative
                invalidScore:
                  summary: Score out of range
                  value:
                    error: score must be a number between 1 and 10
                invalidMediaType:
                  summary: Unknown mediaType
                  value:
                    error: "mediaType must be one of: movie, tv, book"
        "401":
          description: Unauthorized — JWT required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Rating already exists — use PUT to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: You have already rated this item. Use PUT to update your rating.
  /v1/ratings/{id}:
    put:
      tags:
        - Ratings
      summary: Update a rating
      description: Updates the score of an existing rating belonging to the
        authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 0
          example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - score
              properties:
                score:
                  type: integer
                  minimum: 1
                  maximum: 10
                  example: 9
      responses:
        "200":
          description: Rating updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: score must be a number between 1 and 10
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rating not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Ratings
      summary: Delete a rating
      description: >
        Deletes a rating belonging to the authenticated user. Any review that
        was linked to this rating will have its `ratingId` automatically cleared
        to null.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 0
          example: 42
      responses:
        "204":
          description: Rating deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Rating not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/reviews/{mediaType}/{mediaId}:
    get:
      tags:
        - Reviews
      summary: Get all reviews for a media item
      description: Returns all reviews for a given media type and ID.
      parameters:
        - name: mediaType
          in: path
          required: true
          schema:
            type: string
            enum:
              - movie
              - tv
              - book
          example: movie
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 550
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Invalid mediaId
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/reviews/{mediaType}/{mediaId}/{userId}:
    get:
      tags:
        - Reviews
      summary: Get a user's review for a media item
      description: Returns the review a specific user wrote for a specific media item.
      parameters:
        - name: mediaType
          in: path
          required: true
          schema:
            type: string
            enum:
              - movie
              - tv
              - book
          example: movie
        - name: mediaId
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 550
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
          example: 1
      responses:
        "200":
          description: Review found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidMediaId:
                  summary: Non-integer mediaId
                  value:
                    error: Invalid mediaId
                invalidUserId:
                  summary: Non-integer userId
                  value:
                    error: Invalid userId
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Review not found
  /v1/reviews:
    post:
      tags:
        - Reviews
      summary: Create a review
      description: >
        Creates a new review for the authenticated user. Do not supply
        `ratingId` in the request body — if the user already has a rating for
        the same media item, it is automatically linked. If no rating exists
        yet, `ratingId` will be null and is linked automatically when a rating
        is later created. Returns 409 if the user has already reviewed this
        item.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mediaId
                - mediaType
                - body
              properties:
                mediaId:
                  type: integer
                  minimum: 0
                  example: 550
                mediaType:
                  type: string
                  enum:
                    - movie
                    - tv
                    - book
                  example: movie
                body:
                  type: string
                  example: This movie was incredible!
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingFields:
                  summary: Required fields missing
                  value:
                    error: mediaId, mediaType, and body are required
                invalidMediaId:
                  summary: mediaId is not an integer
                  value:
                    error: mediaId must be an integer
                negativeMediaId:
                  summary: mediaId is negative
                  value:
                    error: mediaId must not be negative
        "401":
          description: Unauthorized — JWT required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Review already exists — use PUT to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: You have already reviewed this item. Use PUT to update your review.
  /v1/reviews/{id}:
    put:
      tags:
        - Reviews
      summary: Update a review
      description: Updates the body of an existing review belonging to the
        authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 0
          example: 7
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - body
              properties:
                body:
                  type: string
                  example: Updated review text.
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden — not the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Reviews
      summary: Delete a review
      description: Deletes a review. The owner or an Admin may delete.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 0
          example: 7
      responses:
        "204":
          description: Review deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden — not the owner or an Admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/reviews/admin/{id}:
    delete:
      tags:
        - Reviews
      summary: Delete a review (Admin)
      description: Deletes any review as an administrator. Requires the Admin role or
        higher.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 0
          example: 7
      responses:
        "204":
          description: Review deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden — Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Review not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/reviews/me:
    get:
      tags:
        - Reviews
      summary: Get the authenticated user's reviews
      description: >
        Returns all reviews written by the authenticated user. Identity is
        derived from the JWT `sub` claim — no client-supplied user ID is
        trusted.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of the caller's reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
              example:
                - id: 7
                  userId: 1
                  mediaId: 550
                  mediaType: movie
                  body: An incredible film that changed my perspective.
                  ratingId: 42
                  createdAt: 2026-04-01T10:00:00.000Z
                  updatedAt: 2026-04-01T10:00:00.000Z
                  author:
                    id: 1
                    displayName: Alice Smith
        "401":
          description: Unauthorized — JWT required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/issues:
    post:
      tags:
        - Issues
      summary: Submit a bug report
      description: Accepts a visitor bug report and persists it as an issue. No auth
        required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueSubmission"
      responses:
        "201":
          description: Bug report accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueSubmissionResponse"
        "400":
          description: Validation failure — title and description are both required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithDetails"
              example:
                error: Invalid bug report
                details:
                  - title is required
                  - description is required
        "500":
          description: Failed to save bug report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags:
        - Issues
      summary: List all issues (Admin)
      description: >
        Returns a paginated list of all submitted issues. Requires Admin role or
        higher. Results can be filtered by status and sorted by creation date.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-based).
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          description: Number of results per page. Maximum 100.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: status
          in: query
          description: Comma-separated list of statuses to filter by. Allowed values —
            Open, InProgress, Resolved, Closed.
          required: false
          schema:
            type: string
          example: Open,InProgress
        - name: sort
          in: query
          description: Sort order by creation date. Defaults to newest.
          required: false
          schema:
            type: string
            enum:
              - newest
              - oldest
            default: newest
          example: newest
      responses:
        "200":
          description: Paginated list of issues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueListResponse"
        "400":
          description: Invalid status filter value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorWithDetails"
              example:
                error: Invalid status value(s)
                details: "Unknown: Pending. Allowed: Open, InProgress, Resolved, Closed"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden — Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/issues/{id}:
    get:
      tags:
        - Issues
      summary: Get an issue by ID (Admin)
      description: Returns a single issue by its ID. Requires Admin role or higher.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 12
      responses:
        "200":
          description: Issue found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          description: Invalid issue ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: Invalid issue id
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden — Admin role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Issue not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
