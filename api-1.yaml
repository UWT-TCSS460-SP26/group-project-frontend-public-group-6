          type: integer
          example: 62
        number_of_seasons:
          type: integer
          example: 5
        seasons:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              episode_count:
                type: integer
              air_date:
                type: string
                format: date
                nullable: true
        episode_run_time:
          type: array
          items:
            type: integer
          example:
            - 45
        last_episode_to_air:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            episode_number:
              type: integer
            season_number:
              type: integer
        next_episode_to_air:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            episode_number:
              type: integer
            season_number:
              type: integer
        networks:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              logo_path:
                type: string
                nullable: true
              origin_country:
                type: string
        production_companies:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              logo_path:
                type: string
                nullable: true
              origin_country:
                type: string
        production_countries:
          type: array
          items:
            type: object
            properties:
              iso_3166_1:
                type: string
              name:
                type: string
        created_by:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              profile_path:
                type: string
                nullable: true
    Rating:
      type: object
      properties:
        id:
          type: integer
          example: 42
        userId:
          type: integer
          example: 1
        mediaId:
          type: integer
          example: 550
        mediaType:
          type: string
          enum:
            - movie
            - tv
            - book
          example: movie
        score:
          type: integer
          minimum: 1
          maximum: 10
          example: 8
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        reviewId:
          type: integer
          nullable: true
          description: ID of the linked review, if one exists
          example: 3
        author:
          type: object
          properties:
            id:
              type: integer
              example: 1
            displayName:
              type: string
              example: Alice Smith
    Review:
      type: object
      properties:
        id:
          type: integer
          example: 7
        userId:
          type: integer
          example: 1
        mediaId:
          type: integer
          example: 550
        mediaType:
          type: string
          enum:
            - movie
            - tv
            - book
          example: movie
        ratingId:
          type: integer
          nullable: true
          example: 42
        body:
          type: string
          example: This movie was incredible!
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          type: object
          properties:
            id:
              type: integer
              example: 1
            displayName:
              type: string
              example: Alice Smith
    Issue:
      type: object
      description: A full issue record as stored in the database.
      properties:
        id:
          type: integer
          example: 12
        title:
          type: string
          nullable: true
          example: Unable to load movie list
        description:
          type: string
          nullable: true
          example: The discovery endpoint returns 500 when date filters are applied.
        reproSteps:
          type: string
          nullable: true
          example: 1. GET /v1/movies?primary_release_date_gte=2020-01-01
        reporter:
          type: string
          nullable: true
          example: alice@example.com
        status:
          type: string
          enum:
            - Open
            - InProgress
            - Resolved
            - Closed
          example: Open
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    IssueListResponse:
      type: object
      description: Paginated list of issues returned by the admin list endpoint.
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        total:
          type: integer
          description: Total number of issues matching the filter.
          example: 57
        page:
          type: integer
          description: Current page number.
          example: 1
        limit:
          type: integer
          description: Number of results per page.
          example: 20
        pages:
          type: integer
          description: Total number of pages.
          example: 3
    IssueSubmission:
      type: object
      description: Payload for creating a public issue report. Both title and
        description are required.
      required:
        - title
        - description
      properties:
        title:
          type: string
          example: Unable to load list of movies
          description: A short summary of the bug.
        description:
          type: string
          example: The movie discovery endpoint returns 500 when search includes dates.
          description: A detailed description of the problem.
        reproSteps:
          type: string
          example: 1. Open /v1/movies 2. Set primary_release_date_gte=2020-01-01 3. Send
            request
          description: Optional reproduction steps or expected behavior.
        reporter:
          type: string
          example: alice@example.com
          description: Optional name or identifier of the reporter.
    IssueSubmissionResponse:
      type: object
      properties:
        issueId:
          type: integer
          example: 123
        status:
          type: string
          example: Open
        message:
          type: string
          example: Bug report submitted successfully
        createdAt:
          type: string
          format: date-time
          example: 2026-05-02T13:04:00.000Z
    EnrichedRating:
      type: object
      description: A user's rating paired with TMDB metadata for that item.
      properties:
        rating:
          type: object
          properties:
            id:
              type: integer
              example: 1
            score:
              type: integer
              minimum: 1
              maximum: 10
              example: 8
            mediaId:
              type: integer
              example: 550
            mediaType:
              type: string
              enum:
                - movie
                - tv
                - book
              example: movie
            createdAt:
              type: string
              format: date-time
        tmdb:
          description: TMDB metadata for the rated item. Null for books or if the item was
            removed from TMDB.
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/MovieDetail"
            - $ref: "#/components/schemas/TvDetail"
    MovieTmdbSummary:
      type: object
      description: Trimmed TMDB movie metadata returned by the discovery endpoints.
      properties:
        title:
          type: string
          example: Fight Club
        poster_path:
          type: string
          nullable: true
          example: /pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg
        backdrop_path:
          type: string
          nullable: true
          example: /fCayJrkfRaCRCTh8GqN30f8oyQF.jpg
        overview:
          type: string
          example: A ticking-time-bomb insomniac and a slippery soap salesman channel
            primal male aggression into a brawling underground club.
        genres:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
          example:
            - id: 18
              name: Drama
        release_date:
          type: string
          format: date
          example: 1999-10-15
    TvTmdbSummary:
      type: object
      description: Trimmed TMDB TV show metadata returned by the discovery endpoints.
      properties:
        name:
          type: string
          example: Breaking Bad
        poster_path:
          type: string
          nullable: true
          example: /ggFHVNu6YYI5L9pCfOacjizRGt.jpg
        backdrop_path:
          type: string
          nullable: true
          example: /tsRy63Mu5cu8etL1X7ZLyf7UP1M.jpg
        overview:
          type: string
          example: A chemistry teacher diagnosed with cancer turns to manufacturing drugs
            to secure his family's future.
        genres:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
          example:
            - id: 18
              name: Drama
        first_air_date:
          type: string
          format: date
          example: 2008-01-20
    DiscoveryItem:
      type: object
      description: An aggregated community result enriched with TMDB metadata.
      properties:
        mediaId:
          type: integer
          example: 550
        mediaType:
          type: string
          enum:
            - movie
            - tv
          example: movie
        community_rating:
          type: number
          format: float
          nullable: true
          example: 9.2
        community_rating_count:
          type: integer
          example: 15
        tmdb:
          description: Trimmed TMDB metadata for this item. Null if the TMDB lookup failed.
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/MovieTmdbSummary"
            - $ref: "#/components/schemas/TvTmdbSummary"
    Error:
      type: object
      properties:
        error:
          type: string
          description: A human-readable error message.
          example: Not found
    ErrorWithDetails:
      type: object
      description: Error response that includes an additional details field for
        structured validation feedback.
      properties:
        error:
          type: string
          description: A human-readable error message.
          example: Invalid bug report
        details:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Additional context — either a plain string or a list of specific
            validation errors.
          example:
            - A title or description is required
