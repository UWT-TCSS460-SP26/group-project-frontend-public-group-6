                error: Issue not found
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags:
        - Issues
      summary: Update an issue's status (Admin)
      description: >
        Partially updates an issue. Only the `status` field is accepted.
        Requires Admin role or higher.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 12
